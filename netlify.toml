[build]
  command = "npm run build"
  publish = "dist"

[functions."*"]
  directory = "functions"
  node_bundler = "esbuild"
  external = ["better-sqlite3", "lightningcss", "esbuild", "vite"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
