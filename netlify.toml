[build]
command = "npm run build"
publish = "dist"

[functions]
directory = "functions"
node_bundler = "esbuild"
format = "esm"
external_node_modules = ["better-sqlite3"]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/server"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
