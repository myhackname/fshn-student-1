[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "functions"
  external_node_modules = ["better-sqlite3"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
